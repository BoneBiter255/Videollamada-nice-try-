<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Videollamada</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container-auth">
        <div class="auth-box register-box">
            <div class="auth-header">
                <h1>Crear Cuenta</h1>
                <p>Únete a nuestra plataforma de videollamadas</p>
            </div>

            <form id="registerForm" class="form-register">
                <!-- Campo Nombre Completo -->
                <div class="form-group">
                    <label for="fullname">
                        <i class="fas fa-user"></i> Nombre Completo
                    </label>
                    <input 
                        type="text" 
                        id="fullname" 
                        name="fullname" 
                        placeholder="Juan Pérez"
                        required>
                    <span id="fullname-error" class="error-message"></span>
                </div>

                <!-- Campo Email -->
                <div class="form-group">
                    <label for="register-email">
                        <i class="fas fa-envelope"></i> Correo Electrónico
                    </label>
                    <input 
                        type="email" 
                        id="register-email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required>
                    <span id="email-error" class="error-message"></span>
                </div>

                <!-- Campo Username -->
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-at"></i> Usuario
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="tu_usuario"
                        required>
                    <span id="username-error" class="error-message"></span>
                </div>

                <!-- Campo Contraseña -->
                <div class="form-group">
                    <label for="register-password">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="register-password" 
                            name="password" 
                            placeholder="Mínimo 8 caracteres"
                            required>
                        <button type="button" class="toggle-password" onclick="togglePassword('register-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <span id="strength-text">Contraseña débil</span>
                    </div>
                    <span id="password-error" class="error-message"></span>
                </div>

                <!-- Campo Confirmar Contraseña -->
                <div class="form-group">
                    <label for="confirm-password">
                        <i class="fas fa-lock"></i> Confirmar Contraseña
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="confirm-password" 
                            name="confirmPassword" 
                            placeholder="Repite tu contraseña"
                            required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span id="confirm-error" class="error-message"></span>
                </div>

                <!-- Términos y Condiciones -->
                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms" 
                        required>
                    <label for="terms">
                        Acepto los <a href="#" target="_blank">términos y condiciones</a> y la <a href="#" target="_blank">política de privacidad</a>
                    </label>
                    <span id="terms-error" class="error-message"></span>
                </div>

                <!-- Botón Registrarse -->
                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus"></i> Registrarse
                </button>

                <!-- Newsletter -->
                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="newsletter" 
                        name="newsletter">
                    <label for="newsletter">
                        Recibir noticias y actualizaciones
                    </label>
                </div>
            </form>

            <!-- Enlaces -->
            <div class="auth-footer">
                <p>¿Ya tienes cuenta? 
                    <a href="login.html" class="link-auth">Inicia sesión</a>
                </p>
            </div>

            <!-- Redes Sociales -->
            <div class="social-register">
                <p>O regístrate con</p>
                <div class="social-buttons">
                    <button class="social-btn google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="social-btn github">
                        <i class="fab fa-github"></i>
                    </button>
                    <button class="social-btn microsoft">
                        <i class="fab fa-microsoft"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Lado decorativo -->
        <div class="auth-decorator">
            <div class="decorator-content">
                <h2>Bienvenido</h2>
                <p>Conecta con tus amigos y familia através de videollamadas de calidad</p>
                <div class="decorator-icon">
                    <i class="fas fa-video"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/register.js"></script>
</body>
</html>
